; ESP32-S3 Neural Vision — PlatformIO Configuration
; https://docs.platformio.org/page/projectconf.html

; ============================================================
; Common settings (inherited by all environments)
; ============================================================
[common]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200

board_build.arduino.memory_type = qio_opi

build_flags_common =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3

; ============================================================
; [FULL] Integrated firmware — all modules
; ============================================================
[env:full]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
board_build.arduino.memory_type = ${common.board_build.arduino.memory_type}
build_flags = ${common.build_flags_common}
build_src_filter =
    +<*>
    -<tests/>

; ============================================================
; [TEST] Camera + WiFi + Stream
;   pio run -e test_cam
;   pio run -e test_cam -t upload
;   pio device monitor -e test_cam
; ============================================================
[env:test_cam]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
board_build.arduino.memory_type = ${common.board_build.arduino.memory_type}
build_flags = ${common.build_flags_common}
build_src_filter =
    -<*>
    +<tests/test_cam.cpp>
    +<vision/CameraManager.h>
    +<wifi/WifiManager.h>
    +<server/HttpServer.h>
    +<memory/MemoryManager.h>
    +<pins_config.h>

; ============================================================
; [TEST] Microphone — record & dump audio
;   pio run -e test_mic
; ============================================================
[env:test_mic]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
board_build.arduino.memory_type = ${common.board_build.arduino.memory_type}
build_flags = ${common.build_flags_common}
build_src_filter =
    -<*>
    +<tests/test_mic.cpp>
    +<audio/AudioManager.h>
    +<memory/MemoryManager.h>

; ============================================================
; [TEST] WiFi Manager — AP mode, captive portal, STA connect
;   pio run -e test_wifi
; ============================================================
[env:test_wifi]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
board_build.arduino.memory_type = ${common.board_build.arduino.memory_type}
build_flags = ${common.build_flags_common}
build_src_filter =
    -<*>
    +<tests/test_wifi.cpp>
    +<wifi/WifiManager.h>
    +<wifi/CaptivePortal.h>
    +<server/HttpServer.h>
    +<memory/MemoryManager.h>
    +<pins_config.h>
